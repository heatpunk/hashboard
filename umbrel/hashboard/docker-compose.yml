version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: hashboard_web_1
      APP_PORT: 80

  web:
    # NOTE: pin to a sha256 digest before submitting to getumbrel/umbrel-apps
    # (get it with: docker buildx imagetools inspect ghcr.io/heatpunk/hashboard:0.4.7)
    image: ghcr.io/heatpunk/hashboard:0.4.7
    restart: on-failure
    stop_grace_period: 1m
