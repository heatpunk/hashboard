version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: blisspoint_web_1
      APP_PORT: 80

  web:
    # NOTE: pin to a sha256 digest before submitting to getumbrel/umbrel-apps
    # (get it with: docker buildx imagetools inspect ghcr.io/heatpunk/blisspoint:0.5.2)
    image: ghcr.io/heatpunk/blisspoint:0.5.2
    restart: on-failure
    init: true
    stop_grace_period: 1m
