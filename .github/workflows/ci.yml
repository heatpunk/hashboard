name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

  sdk-check:
    name: Type-check StartOS SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk-build/package-lock.json

      - run: npm --prefix sdk-build ci
      - run: cd sdk-build && npm run check

  proxy-rs:
    name: Build & test proxy-rs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: proxy-rs

      - name: cargo build
        working-directory: proxy-rs
        run: cargo build --verbose

      - name: cargo test
        working-directory: proxy-rs
        run: cargo test --verbose

      - name: cargo clippy
        working-directory: proxy-rs
        run: cargo clippy --all-targets -- -D warnings
