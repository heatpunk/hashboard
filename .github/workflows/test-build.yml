name: Test build (s9pk artifact)

on:
  push:
    branches: [main, feature/rename-to-blisspoint]
  workflow_dispatch:

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version from manifest
        id: ver
        run: |
          v=$(grep -oP "blisspoint:\K[0-9]+\.[0-9]+\.[0-9]+" startos/manifest/index.ts | head -1)
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/blisspoint:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/blisspoint:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  s9pk:
    name: Build s9pk & upload artifact
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v5

      - name: Install start-cli
        run: |
          curl -fsSL https://start9.com/start-cli/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build SDK JavaScript
        run: |
          cd sdk-build
          npm install
          npm run build
          # Generate manifest.json from the JS build
          node -e "const { manifest } = require('./javascript/index.js'); console.log(JSON.stringify(manifest, null, 2))" > manifest.json
          cp manifest.json ..

      - name: Pack s9pk (with workspace fix)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          
          # Setup a local dummy config to prevent start-cli from looking for dev-vm.local
          mkdir -p ~/.start9
          echo '[server]' > ~/.start9/config.toml
          echo 'url = "http://127.0.0.1"' >> ~/.start9/config.toml
          
          # Pack using explicit flags to avoid directory resolution issues
          # Note: manifest.json is now in the root
          start-cli s9pk pack \
            --javascript sdk-build/javascript \
            --icon startos/icon.png \
            --instructions startos/instructions.md \
            --license LICENSE \
            --no-assets \
            -o blisspoint.s9pk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blisspoint-test-s9pk
          path: blisspoint.s9pk
