name: Test build (s9pk artifact)

on:
  push:
    branches: [main, feature/rename-to-blisspoint]
  workflow_dispatch:

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version from manifest
        id: ver
        run: |
          v=$(grep -oP "blisspoint:\K[0-9]+\.[0-9]+\.[0-9]+" startos/manifest/index.ts | head -1)
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/blisspoint:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/blisspoint:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  s9pk:
    name: Build s9pk & upload artifact
    runs-on: ubuntu-latest
    needs: docker
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install start-cli
        run: |
          curl -fsSL https://start9.com/start-cli/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build s9pk
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          
          # Clean up any potential junk from home
          rm -rf ~/.start9 ~/.startos
          
          # Initialize workspace in parent directory
          cd ..
          start-cli s9pk init-workspace .
          
          # Patch workspace config to prevent DNS lookup of dev-vm.local
          sed -i 's|https://dev-vm.local|http://127.0.0.1|g' .startos/config.yaml
          
          # Go back to repo
          cd hashboard
          
          # Build SDK bits
          npm install -g pnpm
          pnpm --prefix sdk-build install
          pnpm --prefix sdk-build run build
          
          # Prepare directory structure for start-cli
          rm -rf ./javascript
          cp -r sdk-build/javascript ./javascript
          
          # Robust manifest extraction looking for 'parsedManifest'
          node -e "const m = require('./javascript/index.js'); const manifest = m.parsedManifest || m.manifest || m.default || m; if (!manifest || Object.keys(manifest).length === 0) { console.error('Error: Extracted manifest is empty!'); process.exit(1); } console.log(JSON.stringify(manifest, null, 2))" > manifest.json
          
          echo "=== DEBUG: manifest.json ==="
          cat manifest.json
          
          # Run pack with absolute paths
          start-cli s9pk pack \
            --javascript "$PWD/javascript" \
            --icon "$PWD/startos/icon.png" \
            --instructions "$PWD/startos/instructions.md" \
            --license "$PWD/LICENSE" \
            --no-assets \
            -o blisspoint.s9pk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blisspoint-test-s9pk
          path: blisspoint.s9pk
