name: Test build (s9pk artifact)

# Builds a sideloadable hashboard.s9pk and uploads it as a workflow ARTIFACT —
# no public GitHub Release, no git tag. For testing a branch before merge.
# Download the artifact from this run's summary page, unzip, and sideload in StartOS.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.4.1) — must match startos/manifest dockerTag'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.inputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  s9pk:
    name: Build s9pk & upload artifact
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install squashfs-tools-ng
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools-ng

      - name: Install start-cli
        run: |
          curl -fsSL https://start9.com/start-cli/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install sdk-build deps
        run: npm --prefix sdk-build ci

      - name: Build SDK JavaScript
        run: cd sdk-build && npm run build

      - name: Generate developer key
        run: start-cli init-key

      - name: Pack s9pk
        run: |
          start-cli s9pk pack \
            --javascript "$GITHUB_WORKSPACE/sdk-build/javascript" \
            --icon startos/icon.png \
            --instructions startos/instructions.md \
            --license LICENSE \
            --no-assets \
            -o hashboard.s9pk

      - name: Inspect manifest
        run: start-cli s9pk inspect hashboard.s9pk manifest

      - name: Upload s9pk artifact
        uses: actions/upload-artifact@v4
        with:
          name: hashboard-${{ github.event.inputs.version }}-s9pk
          path: hashboard.s9pk
          retention-days: 14
          if-no-files-found: error
