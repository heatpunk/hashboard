# Hashboard - StartOS 0.4.0.x package manifest (TEMPLATE).
# IMPORTANT: 0.4.0.x changed packaging vs 0.3.x. Reconcile field names/format
# against the SDK on your node before building:
#   start-cli s9pk pack --help
#   https://docs.start9.com/start-os/0.4.0.x/cli-reference.html
id: hashboard
title: "Hashboard"
version: 0.1.0
release-notes: "Initial StartOS package - LAN miner monitoring and control."
license: MIT
wrapper-repo: "https://github.com/heatpunk/hashboard"
upstream-repo: "https://github.com/heatpunk/hashboard"
support-site: "https://github.com/heatpunk/hashboard/issues"
build: ["make", "pack"]
min-os-version: "0.4.0"
description:
  short: "Control your LAN bitcoin miners from your phone."
  long: >
    Minimalist, mobile-first panel for monitoring and tuning bitcoin miners on
    your local network (BraiinsOS+ / CGMiner API). Discover miners, watch live
    hashrate / power / temperature, pause/resume, and adjust the power target.
main:
  type: docker
  image: main
  entrypoint: "sh"
  args: ["-c", "node server/proxy.cjs & node server/serve.cjs"]
interfaces:
  ui:
    name: "Web UI"
    description: "Hashboard mobile panel"
    ui: true
    lan-config:
      80: { ssl: false, internal: 80 }
    protocols: ["tcp", "http"]
volumes:
  main: { type: data }
